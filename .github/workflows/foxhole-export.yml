# Разовий службовий workflow для прототипу глибокого досьє
# (ENTITY_LAYER_PLAN §2.2). Дістає статті по темі з Postgres бота
# і комітить вигрузку в цю ж гілку. Видалити після експерименту.
#
# Тригер: пуш файлу dossier_export/RUN у цю гілку (workflow_dispatch
# недоступний, поки файл не на main). Формат RUN — два рядки:
#   TSQUERY=Воронов:*
#   DB_URL=postgresql://...
name: foxhole-export

on:
  push:
    branches: [claude/deep-dossier-prototype-b2jo2b]
    paths: [dossier_export/RUN]

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install psycopg2-binary
      - name: Export from foxhole
        run: |
          set -a; source dossier_export/RUN; set +a
          export FOXHOLE_DB_URL="$DB_URL" TOPIC_TSQUERY="$TSQUERY" OUT_PREFIX=dossier_export/topic
          python scripts/foxhole_export.py
      - name: Commit export
        run: |
          git config user.name "foxhole-export"
          git config user.email "actions@github.com"
          git add dossier_export/topic*
          git commit -m "foxhole export"
          git push
